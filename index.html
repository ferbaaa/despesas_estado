function formatNum(v) {
  if (v == null || isNaN(v)) return "—";
  return "R$ " + Math.round(Math.abs(v)).toLocaleString("pt-BR");
}

function pctCalc(act, orc) {
  var aA = Math.abs(act || 0);
  var aO = Math.abs(orc || 0);
  if (!aO) return act ? 999 : 0;
  return ((aA - aO) / aO) * 100;
}

function pctFmt(act, orc) {
  var p = pctCalc(act, orc);
  if (Math.abs(p) > 900) return "N/O";
  return (p >= 0 ? "+" : "") + Math.round(p) + "%";
}

function yoyFmt(a26, a25) {
  if (!a25) return a26 ? "N/A" : "—";
  var p = ((Math.abs(a26) - Math.abs(a25)) / Math.abs(a25)) * 100;
  return (p >= 0 ? "+" : "") + Math.round(p) + "%";
}

function getStatus(act, orc) {
  var aA = Math.abs(act || 0);
  var aO = Math.abs(orc || 0);
  if (!aO && !aA) return "neutral";
  if (!aO) return aA > 0 ? "danger" : "neutral";
  var d = ((aA - aO) / aO) * 100;
  if (d > 15) return "danger";
  if (d > 5) return "warning";
  if (d < -10) return "success";
  return "neutral";
}

/* ===================== YTD helpers ===================== */

function buildYTDCats(jan, fev) {
  var map = {};
  var order = [];
  [jan, fev].forEach(function (period) {
    if (!period) return;
    period.cats.forEach(function (c) {
      if (!map[c.nome]) {
        map[c.nome] = { nome: c.nome, orc: 0, act: 0, a25: 0, subs: null };
        order.push(c.nome);
        if (c.subs) {
          map[c.nome].subs = c.subs.map(function (s) { return { nome: s.nome, orc: 0, act: 0, a25: 0 }; });
        }
      }
      map[c.nome].orc += c.orc || 0;
      map[c.nome].act += c.act || 0;
      map[c.nome].a25 += c.a25 || 0;
      if (c.subs && map[c.nome].subs) {
        c.subs.forEach(function (s, i) {
          if (map[c.nome].subs[i]) {
            map[c.nome].subs[i].orc += s.orc || 0;
            map[c.nome].subs[i].act += s.act || 0;
            map[c.nome].subs[i].a25 += s.a25 || 0;
          }
        });
      }
    });
  });
  return order.map(function (n) { return map[n]; });
}

function buildYTDDesvios(jan, fev) {
  var all = (jan ? jan.desvios : []).concat(fev ? fev.desvios : []);
  var map = {};
  var order = [];
  all.forEach(function (d) {
    if (!map[d.nome]) {
      map[d.nome] = { nome: d.nome, orc: 0, act: 0, drivers: [] };
      order.push(d.nome);
    }
    map[d.nome].orc += d.orc || 0;
    map[d.nome].act += d.act || 0;
    d.drivers.forEach(function (dr) {
      if (map[d.nome].drivers.indexOf(dr) === -1) map[d.nome].drivers.push(dr);
    });
  });
  return order.map(function (n) { return map[n]; });
}

function buildYTDPessoal(jan, fev) {
  if (!jan) return fev || [];
  return jan.map(function (j, i) {
    var f = fev && fev[i] ? fev[i] : { orc: 0, act: 0 };
    return { area: j.area, orc: (j.orc || 0) + (f.orc || 0), act: (j.act || 0) + (f.act || 0) };
  });
}

  cats.forEach(function (c) { totalOrc += c.orc || 0; totalAct += c.act || 0; });

  var headers = ["Categoria", "Orçado", "Realizado", "Orç vs Real", "Var %", "YoY"];
  var headerAligns = ["left", "right", "right", "center", "right", "right"];
  var headerWidths = ["30%", null, null, "16%", null, null];

  return (
    <div style={{ borderRadius: 14, overflow: "hidden", border: "1.5px solid var(--bd3)" }}>
      <table style={{ width: "100%", borderCollapse: "collapse" }}>
        <thead>
          <tr style={{ background: hdrBg() }}>
            {headers.map(function (h, i) {
              return (
                <th key={i} style={{
                  textAlign: headerAligns[i], padding: "12px 14px", fontSize: 11, fontWeight: 700,
                  color: hdrTx(), textTransform: "uppercase", letterSpacing: 0.8,
                  width: headerWidths[i] || undefined
                }}>{h}</th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {cats.filter(function (c) { return c.act || c.orc; }).map(function (c, i) {
            var hasSubs = c.subs && c.subs.length > 0;
            var isOpen = exp[i];
            var s = getStatus(c.act, c.orc);
            var sc = getColors(s);
            var isDeviant = Math.abs(pctCalc(c.act, c.orc)) > 10;

            return (
              <React.Fragment key={i}>
                <tr
                  onClick={hasSubs ? function () { setExp(function (prev) { var n = {}; for (var k in prev) n[k] = prev[k]; n[i] = !prev[i]; return n; }); } : undefined}
                  style={{
                    borderTop: "1px solid var(--bd3)",
                    cursor: hasSubs ? "pointer" : "default",
                    background: isDeviant ? sc.bg : "transparent"
                  }}
                >
                  <td style={{ padding: "12px 14px", fontWeight: 600, fontSize: 13, color: isDeviant ? sc.tx : undefined }}>
                    {hasSubs ? <span style={{ fontSize: 9, marginRight: 6, color: "var(--tx3)" }}>{isOpen ? "▾" : "▸"}</span> : null}
                    {c.nome}
                  </td>
                  <td style={{ textAlign: "right", padding: "12px 14px", fontSize: 13, color: "var(--tx2)" }}>{formatNum(c.orc)}</td>
                  <td style={{ textAlign: "right", padding: "12px 14px", fontSize: 13, fontWeight: 600 }}>{formatNum(c.act)}</td>
                  <td style={{ padding: "12px 14px" }}>
                    <BarPair orc={c.orc} act={c.act} maxVal={maxVal} />
                  </td>
                  <td style={{ textAlign: "right", padding: "12px 14px" }}>
                    <Pill act={c.act} orc={c.orc} />
                  </td>
                  <td style={{ textAlign: "right", padding: "12px 14px", fontSize: 12, color: "var(--tx2)" }}>
                    {c.a25 != null ? yoyFmt(c.act, c.a25) : "—"}
                  </td>
                </tr>
                {isOpen && c.subs ? c.subs.map(function (sub, j) {
                  var ss = getStatus(sub.act, sub.orc);
                  var ssc = getColors(ss);
                  var subDev = Math.abs(pctCalc(sub.act, sub.orc)) > 10;
                  return (
                    <tr key={i + "-" + j} style={{
                      borderTop: "1px solid var(--bd3)",
                      background: subDev ? ssc.bg : "var(--bg2)"
                    }}>
                      <td style={{ padding: "9px 14px 9px 44px", fontSize: 12, color: subDev ? ssc.tx : "var(--tx2)" }}>{sub.nome}</td>
                      <td style={{ textAlign: "right", padding: "9px 14px", fontSize: 12, color: "var(--tx3)" }}>{formatNum(sub.orc)}</td>
                      <td style={{ textAlign: "right", padding: "9px 14px", fontSize: 12 }}>{formatNum(sub.act)}</td>
                      <td style={{ padding: "9px 14px" }}>
                        <BarPair orc={sub.orc} act={sub.act} maxVal={maxVal * 0.4} />
                      </td>
                      <td style={{ textAlign: "right", padding: "9px 14px" }}>
                        <Pill act={sub.act} orc={sub.orc} size={11} />
                      </td>
                      <td style={{ textAlign: "right", padding: "9px 14px", fontSize: 11, color: "var(--tx3)" }}>
                        {sub.a25 != null ? yoyFmt(sub.act, sub.a25) : "—"}
                      </td>
                    </tr>
                  );
                }) : null}
              </React.Fragment>
            );
          })}
          <tr style={{ borderTop: "2px solid var(--bd2)", background: hdrBg() }}>
            <td style={{ padding: "12px 14px", fontWeight: 700, fontSize: 13, color: hdrTx() }}>Total</td>
            <td style={{ textAlign: "right", padding: "12px 14px", fontSize: 13, fontWeight: 700, color: hdrTx(), opacity: 0.7 }}>{formatNum(totalOrc)}</td>
            <td style={{ textAlign: "right", padding: "12px 14px", fontSize: 13, fontWeight: 700, color: hdrTx() }}>{formatNum(totalAct)}</td>
            <td />
            <td style={{ textAlign: "right", padding: "12px 14px" }}><Pill act={totalAct} orc={totalOrc} /></td>
            <td />
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function DesvioCard({ d, isOpen, onToggle }) {
  var delta = Math.abs(d.act || 0) - Math.abs(d.orc || 0);
  var isOver = delta > 0;
  var sKey = isOver ? (delta > 30000 ? "danger" : "warning") : "success";
  var c = getColors(sKey);

  return (
    <div style={{ border: "1.5px solid " + c.bd, borderRadius: 14, marginBottom: 8, overflow: "hidden", background: c.bg }}>
      <div onClick={onToggle} style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
        <span style={{ width: 10, height: 10, borderRadius: 99, background: c.dt, flexShrink: 0 }} />
        <span style={{ fontSize: 13, fontWeight: 600, flex: 1, color: c.tx }}>{d.nome}</span>
        <span style={{ padding: "3px 12px", borderRadius: 99, background: c.pl, color: c.pt, fontSize: 12, fontWeight: 700 }}>
          {(isOver ? "+" : "-") + formatNum(delta)}
        </span>
        <span style={{ fontSize: 10, color: c.tx, opacity: 0.4 }}>{isOpen ? "▾" : "▸"}</span>
      </div>
      {isOpen ? (
        <div style={{ borderTop: "1px solid " + c.bd, padding: "12px 16px" }}>
          <div style={{ fontSize: 12, color: c.tx, opacity: 0.6, marginBottom: 8 }}>
            {"Orçado: " + formatNum(d.orc) + " · Realizado: " + formatNum(d.act) + " · Var: " + pctFmt(d.act, d.orc)}
          </div>
          {d.drivers.map(function (dr, j) {
            return (
              <div key={j} style={{ padding: "5px 0", borderTop: j ? ("1px solid " + c.bd) : "none", fontSize: 12, color: c.tx, display: "flex", alignItems: "flex-start", gap: 6 }}>
                <span style={{ color: c.dt, flexShrink: 0, marginTop: 2 }}>•</span>
                <span>{dr}</span>
              </div>
            );
          })}
        </div>
      ) : null}
    </div>
  );
}

function DesvioSection({ desvios }) {
  var _a = useState(0), openIdx = _a[0], setOpenIdx = _a[1];
  var over = desvios.filter(function (d) { return Math.abs(d.act || 0) > Math.abs(d.orc || 0); });
  var under = desvios.filter(function (d) { return Math.abs(d.act || 0) <= Math.abs(d.orc || 0); });

  var globalIdx = 0;
  return (
    <div>
      {over.length > 0 ? (
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#DC2626", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: "#DC2626" }} />
            {"Acima do orçado (" + over.length + ")"}
          </div>
          {over.map(function (d) {
            var idx = globalIdx++;
            return <DesvioCard key={idx} d={d} isOpen={openIdx === idx} onToggle={function () { setOpenIdx(openIdx === idx ? -1 : idx); }} />;
          })}
        </div>
      ) : null}
      {under.length > 0 ? (
        <div style={{ marginTop: over.length > 0 ? 16 : 0 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#059669", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: "#059669" }} />
            {"Abaixo do orçado (" + under.length + ")"}
          </div>
          {under.map(function (d) {
            var idx = globalIdx++;
            return <DesvioCard key={idx} d={d} isOpen={openIdx === idx} onToggle={function () { setOpenIdx(openIdx === idx ? -1 : idx); }} />;
          })}
        </div>
      ) : null}
    </div>
  );
}

function PessoalGrid({ data }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(145px, 1fr))", gap: 10 }}>
      {data.map(function (d, i) {
        var s = getStatus(d.act, d.orc);
        var c = getColors(s);
        var aO = Math.abs(d.orc || 0);
        var aA = Math.abs(d.act || 0);
        var pBar = aO ? Math.min(aA / aO * 100, 150) : 0;
        return (
          <div key={i} style={{ background: c.bg, border: "1.5px solid " + c.bd, borderRadius: 12, padding: "14px 16px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: c.tx, opacity: 0.6, marginBottom: 4 }}>{d.area}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: c.tx }}>{formatNum(d.act)}</div>
            <div style={{ fontSize: 11, color: c.tx, opacity: 0.4, marginTop: 2 }}>Orç: {formatNum(d.orc)}</div>
            {aO > 0 ? (
              <div style={{ marginTop: 8, height: 5, borderRadius: 3, background: c.bd }}>
                <div style={{ height: 5, borderRadius: 3, background: c.dt, opacity: 0.7, width: Math.min(pBar, 100) + "%" }} />
              </div>
            ) : null}
            <div style={{ marginTop: 6 }}><Pill act={d.act} orc={d.orc} /></div>
          </div>
        );
      })}
    </div>
  );
}

/* ===================== PAGE VIEWS ===================== */

function EntityView({ entityData, entityPessoal, period, showPessoal }) {
  var jan = entityData["jan/2026"];
  var fev = entityData["fev/2026"];
  var isYTD = period === "YTD";

  var cats = isYTD ? buildYTDCats(jan, fev) : (entityData[period] ? entityData[period].cats : []);
  var desvios = isYTD ? buildYTDDesvios(jan, fev) : (entityData[period] ? entityData[period].desvios : []);
  var pessoal = null;
  if (showPessoal && entityPessoal) {
    pessoal = isYTD ? buildYTDPessoal(entityPessoal["jan/2026"], entityPessoal["fev/2026"]) : (entityPessoal[period] || null);
  }

  if (!cats || !cats.length) return <div style={{ padding: 20, color: "var(--tx2)" }}>Sem dados para este período</div>;

  var totalOrc = 0;
  var totalAct = 0;
  cats.forEach(function (c) { totalOrc += c.orc || 0; totalAct += c.act || 0; });
  var fin = cats.find(function (c) { return c.nome.indexOf("financeira") >= 0 && c.nome.indexOf("(") !== 0; });
  var opOrc = totalOrc - (fin ? fin.orc || 0 : 0);
  var opAct = totalAct - (fin ? fin.act || 0 : 0);

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0,1fr))", gap: 12, marginBottom: 24 }}>
        <KPICard label="Total custos e despesas" orc={totalOrc} act={totalAct} accent="blue" />
        <KPICard label="Operacionais (ex-financ.)" orc={opOrc} act={opAct} accent="teal" />
        <KPICard label="Financeiras" orc={fin ? fin.orc : 0} act={fin ? fin.act : 0} accent="purple" />
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ width: 14, height: 6, borderRadius: 3, background: "var(--bd2)", display: "block" }} />
          <span style={{ fontSize: 11, color: "var(--tx3)", fontWeight: 500 }}>Orçado</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ width: 14, height: 6, borderRadius: 3, background: "#3B82F6", display: "block" }} />
          <span style={{ fontSize: 11, color: "var(--tx3)", fontWeight: 500 }}>Realizado</span>
        </div>
        <span style={{ fontSize: 11, color: "var(--tx3)", marginLeft: "auto" }}>Linhas coloridas = desvio &gt;10%</span>
      </div>

      <CategoryTable cats={cats} />

      {desvios && desvios.length > 0 ? (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>{"Desvios >10% — " + desvios.length + " itens"}</div>
          <DesvioSection desvios={desvios} />
        </div>
      ) : null}

      {pessoal ? (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>Pessoal por área</div>
          <PessoalGrid data={pessoal} />
        </div>
      ) : null}
    </div>
  );
}

function ConsolidatedView({ period }) {
  var jan_p = PROSPECT_DATA["jan/2026"];
  var fev_p = PROSPECT_DATA["fev/2026"];
  var jan_d = DEVLET_DATA["jan/2026"];
  var fev_d = DEVLET_DATA["fev/2026"];
  var isYTD = period === "YTD";

  var pCats = isYTD ? buildYTDCats(jan_p, fev_p) : (PROSPECT_DATA[period] ? PROSPECT_DATA[period].cats : []);
  var dCats = isYTD ? buildYTDCats(jan_d, fev_d) : (DEVLET_DATA[period] ? DEVLET_DATA[period].cats : []);

  var pO = 0, pA = 0, dO = 0, dA = 0;
  pCats.forEach(function (c) { pO += c.orc || 0; pA += c.act || 0; });
  dCats.forEach(function (c) { dO += c.orc || 0; dA += c.act || 0; });
  var tO = pO + dO, tA = pA + dA;
  var mx = Math.max(Math.abs(pO), Math.abs(pA), Math.abs(dO), Math.abs(dA), 1);
  var items = [{ nome: "Prospect FIDC", orc: pO, act: pA }, { nome: "Devlet FIDC", orc: dO, act: dA }];

  var headers = ["Empresa", "Orçado", "Realizado", "Orç vs Real", "Δ R$", "Var %"];

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0,1fr))", gap: 12, marginBottom: 24 }}>
        <KPICard label="Consolidado" orc={tO} act={tA} accent="blue" />
        <KPICard label="Prospect" orc={pO} act={pA} accent="teal" />
        <KPICard label="Devlet" orc={dO} act={dA} accent="purple" />
      </div>

      <div style={{ borderRadius: 14, overflow: "hidden", border: "1.5px solid var(--bd3)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: hdrBg() }}>
              {headers.map(function (h, i) {
                return (
                  <th key={i} style={{
                    textAlign: i === 0 ? "left" : i === 3 ? "center" : "right",
                    padding: "12px 14px", fontSize: 11, fontWeight: 700,
                    color: hdrTx(), textTransform: "uppercase", letterSpacing: 0.8
                  }}>{h}</th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {items.map(function (it, i) {
              var s = getStatus(it.act, it.orc);
              var sc = getColors(s);
              var delta = Math.abs(it.act) - Math.abs(it.orc);
              return (
                <tr key={i} style={{ borderTop: "1px solid var(--bd3)" }}>
                  <td style={{ padding: 14, fontWeight: 700, fontSize: 14 }}>{it.nome}</td>
                  <td style={{ textAlign: "right", padding: 14, fontSize: 13, color: "var(--tx2)" }}>{formatNum(it.orc)}</td>
                  <td style={{ textAlign: "right", padding: 14, fontSize: 14, fontWeight: 700 }}>{formatNum(it.act)}</td>
                  <td style={{ padding: 14 }}>
                    <BarPair orc={it.orc} act={it.act} maxVal={mx} />
                  </td>
                  <td style={{ textAlign: "right", padding: 14, fontSize: 13, fontWeight: 500, color: sc.tx }}>
                    {(delta > 0 ? "+" : "") + formatNum(delta)}
                  </td>
                  <td style={{ textAlign: "right", padding: 14 }}>
                    <Pill act={it.act} orc={it.orc} />
                  </td>
                </tr>
              );
            })}
            <tr style={{ borderTop: "2px solid var(--bd2)", background: hdrBg() }}>
              <td style={{ padding: 14, fontWeight: 700, fontSize: 14, color: hdrTx() }}>Consolidado</td>
              <td style={{ textAlign: "right", padding: 14, fontSize: 13, fontWeight: 700, color: hdrTx(), opacity: 0.7 }}>{formatNum(tO)}</td>
              <td style={{ textAlign: "right", padding: 14, fontSize: 14, fontWeight: 700, color: hdrTx() }}>{formatNum(tA)}</td>
              <td /><td />
              <td style={{ textAlign: "right", padding: 14 }}><Pill act={tA} orc={tO} /></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ===================== MAIN APP ===================== */

function App() {
  var _a = useState("prospect"), tab = _a[0], setTab = _a[1];
  var _b = useState("fev/2026"), period = _b[0], setPeriod = _b[1];

  var tabs = [
    { id: "consolidado", label: "Consolidado" },
    { id: "prospect", label: "Prospect" },
    { id: "devlet", label: "Devlet" }
  ];

    consolidado: { bg: "#1E3A5F", bgDk: "#0F2640", tx: "#E8F0FE" },
    prospect: { bg: "#0D4F4F", bgDk: "#042F2E", tx: "#D1FAE5" },
    devlet: { bg: "#3B1F6E", bgDk: "#1E1145", tx: "#EDE9FE" }
  };

  return (
    <div style={{ fontFamily: "var(--fs)", padding: "0.5rem 0" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", gap: 6 }}>
          {tabs.map(function (t) {
            var isActive = tab === t.id;
            var tc = tabColors[t.id];
            return (
              <button key={t.id} onClick={function () { setTab(t.id); }} style={{
                fontSize: 13, fontWeight: 700, padding: "10px 22px", borderRadius: 10,
                background: isActive ? (isDark() ? tc.bgDk : tc.bg) : "var(--bg2)",
                color: isActive ? tc.tx : "var(--tx2)",
                border: isActive ? "none" : "1.5px solid var(--bd3)",
                cursor: "pointer",
                boxShadow: isActive ? "0 2px 8px rgba(0,0,0,0.15)" : "none"
              }}>{t.label}</button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 4, background: "var(--bg2)", borderRadius: 10, padding: 4, border: "1px solid var(--bd3)" }}>
          {PERIODS.map(function (p) {
            var isActive = period === p;
            return (
              <button key={p} onClick={function () { setPeriod(p); }} style={{
                fontSize: 12, fontWeight: isActive ? 700 : 500, padding: "7px 16px", borderRadius: 8,
                background: isActive ? (isDark() ? "#0F2640" : "#1E3A5F") : "transparent",
                color: isActive ? "#E8F0FE" : "var(--tx2)",
                border: "none", cursor: "pointer"
              }}>{p}</button>
            );
          })}
        </div>
      </div>

      <div style={{ fontSize: 11, color: "var(--tx3)", marginBottom: 18, letterSpacing: 0.3 }}>
        {"Análise custos e despesas · Orçado vs Realizado · " + (period === "YTD" ? "Jan + Fev 2026" : period)}
      </div>

      {tab === "consolidado" ? <ConsolidatedView period={period} /> : null}
      {tab === "prospect" ? <EntityView entityData={PROSPECT_DATA} entityPessoal={PROSPECT_PESSOAL} period={period} showPessoal={true} /> : null}
      {tab === "devlet" ? <EntityView entityData={DEVLET_DATA} entityPessoal={null} period={period} showPessoal={false} /> : null}
    </div>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
